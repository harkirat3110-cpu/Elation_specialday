<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday My Love ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:black;
}

/* BACKGROUND CANVAS */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* TITLE */
h1{
margin-top:50px;
font-size:50px;
background:linear-gradient(45deg,#ff4da6,#ffffff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 20px #ff4da6;
}

/* COUNTDOWN */
#countdown{
font-size:22px;
margin-top:10px;
}

/* SLIDESHOW */
.slideshow img{
width:300px;
margin-top:30px;
border-radius:20px;
box-shadow:0 0 40px pink;
transition:opacity 1s;
}

/* GIFT */
.gift{
font-size:80px;
margin-top:30px;
cursor:pointer;
}

/* LETTER */
#letter{
display:none;
margin:30px auto;
width:85%;
max-width:600px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
}

/* CELEBRATION OVERLAY */
#celebration{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

/* BIG TEXT */
#celebration h2{
font-size:60px;
background:linear-gradient(45deg,#ff4da6,#fff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
animation:zoom 2s ease;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0}
to{transform:scale(1);opacity:1}
}

/* MESSAGE CARD */
#celebration p{
max-width:700px;
margin-top:20px;
font-size:20px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
}

/* MUSIC BUTTON */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4da6;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<h1>Happy Birthday Elation❤️</h1>

<div id="countdown"></div>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>💌 For You</h2>
<p id="message"></p>
</div>

<div id="celebration">
<h2>🎉 HAPPY BIRTHDAY 🎉</h2>
<p id="celebrationText"></p>
</div>

<button id="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSIC */
function playMusic(){
document.getElementById("music").play();
document.getElementById("musicBtn").style.display="none";
}

/* SLIDESHOW */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg","photo6.jpg","photo7.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%photos.length;
let img=document.getElementById("slide");
img.style.opacity=0;
setTimeout(()=>{
img.src=photos[index];
img.style.opacity=1;
},500);
},3000);

/* COUNTDOWN */
let birthday=new Date("2026-03-17T00:00:00").getTime();

let timer=setInterval(()=>{

let now=new Date().getTime();
let dist=birthday-now;

if(dist<=0){
clearInterval(timer);
startCelebration();
return;
}

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s ❤️";

},1000);

/* LETTER */
let text="Distance means nothing when someone means everything. You are my heart, my forever. ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}
}

function openGift(){
document.getElementById("letter").style.display="block";
type();
}

/* CELEBRATION MODE */
function startCelebration(){

document.getElementById("celebration").style.display="flex";
document.getElementById("celebrationText").innerText=
"Today the universe celebrates you. Even miles apart, our hearts beat together. You are my love, my happiness, my forever. ❤️";

launchFireworks();
launchConfetti();
}

/* FIREWORKS */
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){
setInterval(()=>{
for(let i=0;i<80;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
},800);
}

function launchConfetti(){
for(let i=0;i<200;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*4,
vy:Math.random()*3,
life:150,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,4,4);

if(p.life<=0){
particles.splice(index,1);
}
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
