<!DOCTYPE html>
<html>
<head>

<title>For My Forever ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow:hidden;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
background-size:400% 400%;
animation:gradient 15s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* STAR CANVAS */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* TITLE */
h1{
margin-top:40px;
font-size:48px;
background:linear-gradient(45deg,#ff4da6,#fff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff4da6;}
to{text-shadow:0 0 30px #ff4da6;}
}

/* COUNTDOWN */
#countdown{
font-size:20px;
margin-top:10px;
}

/* SLIDESHOW */
.slideshow{
margin-top:25px;
}

.slideshow img{
width:300px;
border-radius:20px;
box-shadow:0 0 40px pink;
transition:opacity 1s ease-in-out;
}

/* GIFT */
.gift{
font-size:80px;
margin-top:20px;
cursor:pointer;
transition:0.3s;
}
.gift:hover{
transform:scale(1.2);
}

/* LETTER */
#letter{
display:none;
margin:20px auto;
width:85%;
max-width:600px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
}

/* CELEBRATION */
#celebration{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
z-index:10;
}

#celebration h2{
font-size:55px;
background:linear-gradient(45deg,#ff4da6,#fff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
}

#celebration p{
max-width:700px;
margin-top:15px;
font-size:18px;
background:rgba(255,255,255,0.1);
padding:18px;
border-radius:15px;
}

/* MUSIC BUTTON */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4da6;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
box-shadow:0 0 15px #ff4da6;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<h1>Happy Birthday My Love ❤️</h1>

<div id="countdown"></div>

<!-- SLIDESHOW RESTORED -->
<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>💌 For You</h2>
<p id="message"></p>
</div>

<div id="celebration">
<h2>🎉 HAPPY BIRTHDAY 🎉</h2>
<p id="celebrationText"></p>
</div>

<button id="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSIC */
function playMusic(){
document.getElementById("music").play();
document.getElementById("musicBtn").style.display="none";
}

/* SLIDESHOW */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%photos.length;
let img=document.getElementById("slide");
img.style.opacity=0;
setTimeout(()=>{
img.src=photos[index];
img.style.opacity=1;
},500);
},3000);

/* COUNTDOWN */

/* COUNTDOWN (INDIAN STANDARD TIME - NEW DELHI) */

let birthday = new Date("2026-03-17T00:00:00+05:30").getTime();

function getIndiaTime(){
  return new Date(
    new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );
}

let timer = setInterval(()=>{

let now = getIndiaTime().getTime();
let dist = birthday - now;

if(dist <= 0){
clearInterval(timer);
document.getElementById("countdown").innerHTML =
"🎉 IT'S YOUR SPECIAL DAY!🎉";
startCelebration();
return;
}

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s ❤️ (IST)";

},1000);

/* TYPEWRITER */
let text="Distance means nothing when someone means everything. You are my heart, my forever. ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}
}

function openGift(){
document.getElementById("letter").style.display="block";
type();
playMusic();
}

/* CELEBRATION */
function startCelebration(){

document.getElementById("celebration").style.display="flex";

document.getElementById("celebrationText").innerText=
"You are my happiness, my peace, and my forever. Even miles apart, our hearts stay connected. Today the universe celebrates you. ❤️";

launchFireworks();

}

/* FIREWORKS */
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){
setInterval(()=>{
for(let i=0;i<80;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*7,
vy:(Math.random()-0.5)*7,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
},800);
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,4,4);

if(p.life<=0){
particles.splice(index,1);
}
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
