<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday My Love ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:radial-gradient(circle at bottom,#12002f,#000);
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

h1{
margin-top:55px;
font-size:52px;
background:linear-gradient(45deg,#ff4da6,#ffffff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px #ff4da6;
}

#countdown{
font-size:22px;
margin-top:10px;
letter-spacing:2px;
}

.slideshow img{
width:320px;
border-radius:25px;
box-shadow:0 0 45px rgba(255,105,180,0.8);
transition:opacity 1s ease-in-out;
margin-top:35px;
}

.gift{
font-size:90px;
margin-top:35px;
cursor:pointer;
transition:0.3s;
}

.gift:hover{
transform:scale(1.2);
}

#letter{
display:none;
margin:35px auto;
width:85%;
max-width:600px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:28px;
border-radius:20px;
box-shadow:0 0 50px rgba(255,105,180,0.5);
}

#celebrationText{
display:none;
margin:30px auto;
width:85%;
max-width:650px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
box-shadow:0 0 40px pink;
font-size:20px;
animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatUp 7s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

.particle{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
pointer-events:none;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(0);opacity:0}
}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4da6;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
box-shadow:0 0 20px #ff4da6;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Happy Birthday My Love ❤️</h1>

<div id="countdown"></div>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>💌 For You</h2>
<p id="message"></p>
</div>

<div id="celebrationText"></div>

<button id="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSIC */
function playMusic(){
let music=document.getElementById("music");
music.play().then(()=>{
document.getElementById("musicBtn").style.display="none";
});
}

/* SLIDESHOW */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%photos.length;
let img=document.getElementById("slide");
img.style.opacity=0;
setTimeout(()=>{
img.src=photos[index];
img.style.opacity=1;
},500);
},3000);

/* COUNTDOWN */
let birthday=new Date("2026-03-17T00:00:00").getTime();

let countdownInterval=setInterval(()=>{

let now=new Date().getTime();
let dist=birthday-now;

if(dist<=0){
clearInterval(countdownInterval);
document.getElementById("countdown").innerHTML="🎉 IT'S YOUR SPECIAL DAY! 🎉";
startCelebration();
return;
}

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s ❤️";

},1000);

/* STARS */
let canvas=document.getElementById("stars");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<400;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.8,
speed:Math.random()*0.5
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
s.y+=s.speed;
if(s.y>canvas.height)s.y=0;

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

/* HEARTS */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
},700);

/* TYPEWRITER */
let text="Distance means nothing when someone means everything. You are my heart, my peace, my forever. Happy Birthday my love ❤️";

let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,35);
}
}

/* GIFT */
function openGift(){
document.getElementById("letter").style.display="block";
playMusic();
type();
}

/* CELEBRATION MODE */
function startCelebration(){

openGift();

let celebrationMessage=`
🎉 Happy Birthday My Love! 🎉

Today the world became brighter because you were born.

Even though we are miles apart, my heart stays right next to yours.
This distance only makes my love stronger every day.

You are my happiness, my comfort, and my forever.
I am so proud of you and so deeply in love with you. ❤️
`;

let box=document.getElementById("celebrationText");
box.style.display="block";
box.innerText=celebrationMessage;

/* FIREWORKS */
setInterval(()=>{

for(let i=0;i<60;i++){

let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
p.style.background=`hsl(${Math.random()*360},100%,60%)`;
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);

}

},2000);

}

</script>

</body>
</html>
