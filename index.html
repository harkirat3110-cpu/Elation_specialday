<!DOCTYPE html>

<html>
<head>

<title>Happy Birthday Mithi ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:radial-gradient(circle at bottom,#0b0b2a,#000);
}

/* CANVAS SKY */

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* TITLE */

h1{
margin-top:60px;
font-size:55px;
background:linear-gradient(45deg,#ff6fa5,#ffd6e7);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px pink;
}

/* COUNTDOWN */

#countdown{
font-size:24px;
letter-spacing:2px;
margin-top:10px;
}

/* CAKE */

.cake{
font-size:80px;
margin-top:20px;
cursor:pointer;
transition:transform .3s;
}

.cake:hover{
transform:scale(1.2);
}

/* SLIDESHOW */

.slideshow img{
margin-top:35px;
width:330px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,105,180,0.7);
animation:fade 3s ease-in-out;
}

@keyframes fade{
0%{opacity:.4;transform:scale(.95)}
100%{opacity:1;transform:scale(1)}
}

/* GIFT */

.gift{
font-size:95px;
margin-top:40px;
cursor:pointer;
transition:.4s;
}

.gift:hover{
transform:scale(1.2) rotate(-8deg);
}

/* LETTER */

#letter{
display:none;
margin-top:40px;
width:70%;
margin-left:auto;
margin-right:auto;
font-size:22px;
background:rgba(255,182,193,0.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,105,180,0.5);
}

/* HEARTS */

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

/* FIREWORK */

.firework{
position:fixed;
font-size:32px;
animation:explode 1.1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0);opacity:1}
100%{transform:scale(3);opacity:0}
}

/* CURSOR SPARKLE */

.spark{
position:fixed;
pointer-events:none;
font-size:14px;
animation:spark .8s linear forwards;
}

@keyframes spark{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:scale(2)}
}

/* MUSIC BUTTON */

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6fa5;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
box-shadow:0 0 15px pink;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<h1>Happy Birthday Elation Darling 🎂❤️</h1>

<div id="countdown"></div>

<div class="cake" onclick="blowCandles()">🎂</div>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>💌 For You</h2>
<p id="message"></p>
</div>

<button id="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* PHOTO SLIDESHOW */

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg"
];

let index=0;

setInterval(()=>{
index++;
if(index>=photos.length){index=0}
document.getElementById("slide").src=photos[index];
},3000);


/* COUNTDOWN */

let birthday=new Date("2026-03-17").getTime();

setInterval(()=>{

let now=new Date().getTime();
let dist=birthday-now;

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+" days "+h+" hours "+m+" minutes "+s+" seconds ❤️";

},1000);


/* STARS SKY */

let canvas=document.getElementById("stars");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<350;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
speed:Math.random()*0.6
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{

star.y+=star.speed;

if(star.y>canvas.height){
star.y=0;
}

ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(drawStars);

}

drawStars();


/* FLOATING HEARTS */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},800);


/* CURSOR SPARKLE */

document.addEventListener("mousemove",e=>{

let spark=document.createElement("div");
spark.className="spark";
spark.innerHTML="✨";

spark.style.left=e.pageX+"px";
spark.style.top=e.pageY+"px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),800);

});


/* TYPEWRITER LETTER */

let text="From the moment you came into my life, everything became brighter. You make ordinary days feel magical and every moment with you is my favorite memory. This little website is just a reminder of how incredibly special you are to me. Happy Birthday my love ❤️ I love you forever.";

let i=0;

function typeLetter(){

if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeLetter,40);
}

}


/* PLAY MUSIC (FIXED AUDIO ISSUE) */

function playMusic(){

let music=document.getElementById("music");

music.play().then(()=>{
document.getElementById("musicBtn").style.display="none";
}).catch(()=>{
alert("Tap the button again to start music 🎵");
});

}


/* OPEN GIFT */

function openGift(){

document.getElementById("letter").style.display="block";

playMusic();

typeLetter();

/* FIREWORKS */

for(let i=0;i<40;i++){

let fire=document.createElement("div");
fire.className="firework";
fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1100);

}

}


/* CAKE INTERACTION */

function blowCandles(){

document.querySelector(".cake").innerHTML="🍰";

for(let i=0;i<20;i++){

let fire=document.createElement("div");
fire.className="firework";
fire.innerHTML="✨";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

</script>

</body>
</html>
