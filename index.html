<!DOCTYPE html>
<html>
<head>
<title>For My Forever ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow:hidden;
background:black;
display:flex;
flex-direction:column;
align-items:center;
}

/* CANVAS (STARS + FIREWORKS) */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
}

/* TITLE */
h1{
margin-top:35px;
font-size:42px;
background:linear-gradient(45deg,#ff4da6,#fff,#ffb6e6);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff4da6;}
to{text-shadow:0 0 25px #ff4da6;}
}

/* COUNTDOWN */
#countdown{
font-size:18px;
margin-top:8px;
}

/* SLIDESHOW */
.slideshow{
margin-top:20px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slideshow img{
max-width:90%;
max-height:300px;
border-radius:18px;
box-shadow:0 0 30px pink;
object-fit:contain;
}

/* GIFT */
.gift{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
font-size:80px;
cursor:pointer;
z-index:20;
transition:0.3s;
}

.gift.open{
animation:giftOpen 0.8s forwards;
}

@keyframes giftOpen{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.3);}
100%{transform:translateX(-50%) scale(0);opacity:0;}
}

/* LETTER */
#letter{
display:none;
margin-top:15px;
width:85%;
max-width:600px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:20px;
border-radius:18px;
}

/* CELEBRATION */
#celebration{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
z-index:50;
}

#celebration h2{
font-size:45px;
background:linear-gradient(45deg,#ff4da6,#fff);
-webkit-background-clip:text;
color:transparent;
}

#celebration p{
max-width:700px;
margin-top:15px;
font-size:17px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
}

/* MUSIC BUTTON */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4da6;
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
}

.petal{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<h1>Happy Birthday My Love ❤️</h1>

<div id="countdown"></div>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>💌 For You</h2>
<p id="message"></p>
</div>

<div id="celebration">
<h2>🎉 HAPPY BIRTHDAY 🎉</h2>
<p id="celebrationText"></p>
</div>

<button id="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* ===== CANVAS SETUP FIRST (IMPORTANT FIX) ===== */

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* ===== STARS ===== */

let stars=[];
for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
});
}

/* ===== FIREWORKS ===== */

let particles=[];

function launchFireworks(){
setInterval(()=>{
for(let i=0;i<60;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
},800);
}

function animate(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* draw stars */
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

/* draw fireworks */
particles.forEach((p,index)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0){
particles.splice(index,1);
}
});

requestAnimationFrame(animate);
}
animate();

/* ===== ROSE PETALS ===== */

setInterval(()=>{
let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌹";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),10000);
},600);

/* ===== SLIDESHOW (FULL SIZE FIXED) ===== */

let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg","photo6.jpg","photo7.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%photos.length;
document.getElementById("slide").src=photos[index];
},3000);

/* ===== COUNTDOWN IN IST (NEW DELHI) ===== */

let birthday=new Date("2026-03-17T00:00:00+05:30").getTime();

setInterval(()=>{

let now=new Date().getTime();
let dist=birthday-now;

if(dist<=0){
document.getElementById("countdown").innerHTML="🎉 IT'S YOUR DAY! 🎉";
startCelebration();
return;
}

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s ❤️ (IST)";

},1000);

/* ===== TYPEWRITER ===== */

let text="Distance means nothing when someone means everything. You are my heart, my forever. ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}
}

/* ===== GIFT OPEN FIXED ===== */

function openGift(){

let gift=document.querySelector(".gift");
gift.classList.add("open");

setTimeout(()=>{
document.getElementById("letter").style.display="block";
type();
playMusic();
},700);
}

/* ===== MUSIC ===== */

function playMusic(){
document.getElementById("music").play();
document.getElementById("musicBtn").style.display="none";
}

/* ===== CELEBRATION ===== */

function startCelebration(){
document.getElementById("celebration").style.display="flex";
document.getElementById("celebrationText").innerText=
"You are my happiness, my peace, and my forever. Even miles apart, our hearts stay connected. ❤️";
launchFireworks();
}

</script>

</body>
</html>
